<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SoftWallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f0a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(102, 204, 138, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 204, 138, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Glowing blob */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(102, 204, 138, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .login-card {
            background: linear-gradient(145deg, #111a11, #0d150d);
            border: 1px solid rgba(102, 204, 138, 0.15);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 0 0 1px rgba(102, 204, 138, 0.05),
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            animation: cardAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-shake { animation: cardShake 0.45s ease; }
        @keyframes cardShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-7px); }
            80% { transform: translateX(5px); }
        }

        .logo-circle {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #1a2e1a, #203a20);
            border: 1px solid rgba(102, 204, 138, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 30px rgba(102, 204, 138, 0.15);
        }

        .logo-circle svg { color: #66cc8a; }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            color: #f1f5f9;
            margin-bottom: 0.35rem;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 2.25rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.1rem;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field input {
            width: 100%;
            padding: 0.9rem 3rem 0.9rem 1.1rem;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        .field input::placeholder { color: #475569; }

        .field input:focus {
            border-color: #66cc8a;
            background: rgba(102, 204, 138, 0.04);
            box-shadow: 0 0 0 3px rgba(102, 204, 138, 0.15);
        }

        .toggle-pw {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: #66cc8a; }

        .error-msg {
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.875rem;
            color: #f87171;
            margin-bottom: 1.25rem;
        }
        .error-msg.visible { display: flex; }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #2d6a45 0%, #66cc8a 100%);
            color: #0a0f0a;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 20px rgba(102, 204, 138, 0.3);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 204, 138, 0.4);
        }

        .login-btn:active { transform: translateY(0); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.75rem;
            color: #475569;
            font-size: 0.88rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #66cc8a; }
        .back-link span { color: #66cc8a; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <div class="logo-circle">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1>Admin Access</h1>
            <p class="subtitle">Sign in to manage your chatbot</p>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Enter username" autocomplete="off" required>
                    </div>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="error-msg" id="errorMsg">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Invalid credentials. Please try again.
                </div>

                <button type="submit" class="login-btn">
                    Login to Dashboard
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>

            <a href="index.html" class="back-link">← Back to <span>SoftWallet</span></a>
        </div>
    </div>

    <script>
        // Redirect if already logged in (sessionStorage clears on tab/browser close)
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }

        const loginForm = document.getElementById('loginForm');
        const errorMsg  = document.getElementById('errorMsg');
        const card      = document.getElementById('loginCard');
        const pwInput   = document.getElementById('password');
        const togglePw  = document.getElementById('togglePw');
        const eyeIcon   = document.getElementById('eyeIcon');

        // Show/Hide password
        togglePw.addEventListener('click', () => {
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
            eyeIcon.innerHTML = isHidden
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        });

        // Login handler
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            errorMsg.classList.remove('visible');

            if (user === 'Anuj' && pass === 'anuj@123') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.classList.add('visible');
                card.classList.remove('card-shake');
                void card.offsetWidth;
                card.classList.add('card-shake');
            }
        });
    </script>
</body>
</html>
