<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <header class="navbar">
        <div class="logo">SoftWallet</div>
        <div class="nav-links">
            <a href="admin-login.html" class="admin-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Admin
            </a>
            <div id="theme-toggle" class="theme-toggle-wrapper">
                <span class="theme-text">Dark</span>
                <div class="theme-track">
                    <div class="theme-slider"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Veda for</h1>
            <h1 class="hero-subtitle highlight">SoftWallet Innovative</h1>
            <p class="hero-text">Smart solutions for a smarter tomorrow.</p>
        </div>
    </section>

    <!-- Floating Chat Widget -->
    <div id="chat-widget-container" class="chat-widget-container hidden">
        <div class="chat-header">
            <h3 id="chat-header-title">Welcome!</h3>
            <button id="close-chat" class="btn-theme close-btn">✖</button>
        </div>
        
        <!-- Lead Capture View -->
        <div id="lead-view" class="widget-view">
            <p class="widget-description">Please enter your details to start chatting.</p>
            <form id="lead-form">
                <input type="text" id="lead-name" placeholder="Your Name" required>
                <input type="email" id="lead-email" placeholder="Your Email" required>
                <input type="tel" id="lead-phone" placeholder="Your Phone (Optional)">
                <button type="submit" class="btn-primary start-chat-btn">Start Chat</button>
            </form>
        </div>

        <!-- Chat Interface View -->
        <div id="chat-view" class="widget-view hidden">
            <div class="chat-box" id="chat-box">
                <!-- Welcome message inserted dynamically -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." disabled>
                <button id="send-btn" class="btn-primary send-btn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Floating Chat Button -->
    <button id="floating-chat-btn" class="floating-chat-btn">
        Chat
    </button>

    <script src="script.js"></script>
</body>
</html>
